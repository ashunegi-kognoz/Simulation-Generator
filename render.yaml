services:
  - type: web
    name: allocation-room-api
    env: python
    plan: free
    pythonVersion: 3.11
    buildCommand: "pip install -r requirements.txt && alembic upgrade head"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port 8000"
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: APP_ENV
        value: production
      - key: LLM_PROVIDER
        value: openai
      - key: CORS_ALLOW_ORIGINS
        value: https://allocation-room.vercel.app,http://localhost:3000
      - key: MAX_CONCURRENCY
        value: "12"
      - key: MAX_REVISIONS
        value: "2"
      - key: RATE_LIMIT_PER_MINUTE
        value: "120"
